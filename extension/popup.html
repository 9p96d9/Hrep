<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HrepNext</title>
<style>
  :root { --bg:#101418; --panel:#1a2028; --text:#e8e8e8; --sub:#9aa4af;
          --blue:#5b9bd5; --red:#e94560; --green:#4caf93; --warn:#d5a95b; }
  * { box-sizing:border-box; }
  html, body { margin:0; }
  body { width:300px; background:var(--bg); color:var(--text);
         font-family:"Hiragino Sans","Noto Sans JP",sans-serif; font-size:13px; padding:12px; }
  h1 { margin:0 0 10px; font-size:15px; }
  .panel { background:var(--panel); border:1px solid #2a323d; border-radius:8px;
           padding:10px 12px; margin:8px 0; }
  .row { display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .sub { color:var(--sub); font-size:11px; }
  .dot { width:9px; height:9px; border-radius:50%; background:var(--sub); display:inline-block; }
  .dot.ok { background:var(--green); }
  .dot.bad { background:var(--red); }
  .label { display:flex; align-items:center; gap:7px; }
  button { cursor:pointer; border:1px solid #3a4450; background:#232b35; color:var(--text);
           border-radius:6px; padding:5px 12px; font-size:12px; }
  button.on { border-color:var(--green); color:var(--green); }
  button.off { border-color:#3a4450; color:var(--sub); }
  .hand { font-size:12px; line-height:1.5; }
  .hand .muted { color:var(--sub); }
  input[type=text] { width:100%; margin-top:6px; background:#232b35; color:var(--text);
                     border:1px solid #3a4450; border-radius:6px; padding:5px 8px; font-size:12px; }
</style>
</head>
<body>
  <h1>HrepNext Hand Capture</h1>

  <!-- 1. 接続状態インジケータ -->
  <div class="panel">
    <div class="row">
      <span class="label"><span id="conn-dot" class="dot"></span> 接続状態</span>
      <span id="conn-text" class="sub">確認中…</span>
    </div>
    <input id="endpoint" type="text" placeholder="https://hrep.app" spellcheck="false">
  </div>

  <!-- 2. 傍受ON/OFFトグル -->
  <div class="panel">
    <div class="row">
      <span class="label">WebSocket傍受</span>
      <button id="capture-toggle" class="off">OFF</button>
    </div>
  </div>

  <!-- 3. 最終取得ハンドのサマリー -->
  <div class="panel">
    <div class="sub">最終取得ハンド</div>
    <div id="last-hand" class="hand muted">まだありません</div>
  </div>

  <!-- 4. 自動解析トグル -->
  <div class="panel">
    <div class="row">
      <span class="label">取得後に自動解析</span>
      <button id="auto-toggle" class="off">OFF</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
